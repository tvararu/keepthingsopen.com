<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --ink: #0b0c0c;
        --paper: #ffffff;
        --orange: #f47738;
        --muted: #b1b4b6;
        --sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1200px;
        height: 630px;
        background: var(--ink);
        color: var(--paper);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
      }
      .card {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 72px 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        border-bottom: 16px solid var(--orange);
      }
      .wordmark {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      .glyph {
        display: inline-block;
        width: 36px;
        height: 36px;
        background: #fff;
        position: relative;
      }
      .glyph::after {
        content: "";
        position: absolute;
        inset: 9px;
        background: var(--ink);
      }
      .wordmark strong { font-weight: 800; }
      h1 {
        font-size: 132px;
        line-height: 1.02;
        font-weight: 800;
        letter-spacing: -0.02em;
        max-width: 18ch;
      }
      h1 em {
        font-style: normal;
        color: var(--orange);
      }
      .meta {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 32px;
        font-size: 24px;
        color: var(--muted);
        font-weight: 500;
      }
      .meta strong { color: #fff; font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="wordmark">
        <span class="glyph" aria-hidden="true"></span>
        <span>keep<strong>things</strong>open</span>
      </div>
      <h1>Keep things open. <em>It makes things better.</em></h1>
      <div class="meta">
        <span>An open letter to <strong>NHS England</strong></span>
        <span>keepthingsopen.com</span>
      </div>
    </div>
  </body>
</html>
